name: Build Real IPA

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest  # iOSアプリのビルドにはMac環境が必須です
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode.app

    - name: Build WebDriverAgent
      run: |
        # 以前のバージョンで必要だったスクリプトの存在を確認
        if [ -f "./Scripts/bootstrap.sh" ]; then
          ./Scripts/bootstrap.sh
        fi
        
        # 実機用(generic/platform=iOS)にビルドを実行
        # これにより本物のバイナリが生成されます
        xcodebuild -project WebDriverAgent.xcodeproj \
                   -scheme WebDriverAgentRunner \
                   -destination 'generic/platform=iOS' \
                   -configuration Release \
                   -derivedDataPath build \
                   build-for-testing

    - name: Package IPA
      run: |
        # インストール可能な形式(IPA)にパッケージングします
        mkdir -p Payload
        cp -r build/Build/Products/Release-iphoneos/WebDriverAgentRunner-Runner.app Payload/
        zip -r WebDriverAgentRunner.ipa Payload/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WebDriverAgent-Fixed-IPA
        path: WebDriverAgentRunner.ipa
