name: Build Real IPA

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode.app

    - name: Build WebDriverAgent
      run: |
        # 依存関係を強制的に解決（エラーが出ても次へ進む）
        ./Scripts/bootstrap.sh || true
        
        # 依存ライブラリを全て含めて実機用にビルド
        xcodebuild -project WebDriverAgent.xcodeproj \
                   -scheme WebDriverAgentRunner \
                   -destination 'generic/platform=iOS' \
                   -configuration Release \
                   -derivedDataPath build \
                   COMPILER_INDEX_STORE_ENABLE=NO \
                   -allowProvisioningUpdates \
                   build-for-testing

    - name: Package IPA
      run: |
        # Payloadフォルダの作成
        mkdir -p Payload
        
        # 成果物をディレクトリごと再帰的にコピー（Frameworksを確実に含む）
        cp -R build/Build/Products/Release-iphoneos/WebDriverAgentRunner-Runner.app Payload/
        
        # 署名の競合を防ぐため古い署名を削除（TrollStore/Sideloadly用）
        rm -rf Payload/WebDriverAgentRunner-Runner.app/_CodeSignature
        
        # IPAとして圧縮
        zip -r WebDriverAgentRunner.ipa Payload/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WebDriverAgent-Fixed-IPA
        path: WebDriverAgentRunner.ipa
