name: Build Real IPA

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode.app

    - name: Build WebDriverAgent
      run: |
        if [ -f "./Scripts/bootstrap.sh" ]; then
          ./Scripts/bootstrap.sh || true
        fi
        
        # CODE_SIGN_IDENTITY="-" を使うことで、Ad-hoc署名（自分用署名）を強制付与します
        xcodebuild -project WebDriverAgent.xcodeproj \
                   -scheme WebDriverAgentRunner \
                   -destination 'generic/platform=iOS' \
                   -configuration Release \
                   -derivedDataPath build \
                   CODE_SIGNING_ALLOWED=YES \
                   CODE_SIGNING_REQUIRED=YES \
                   CODE_SIGN_IDENTITY="-" \
                   PROVISIONING_PROFILE_SPECIFIER="" \
                   AD_HOC_CODE_SIGNING_ALLOWED=YES \
                   COMPILER_INDEX_STORE_ENABLE=NO \
                   build-for-testing

    - name: Package IPA
      run: |
        mkdir -p Payload
        cp -R build/Build/Products/Release-iphoneos/WebDriverAgentRunner-Runner.app Payload/
        # ここでは _CodeSignature を消さずに残します（Ad-hoc署名を維持するため）
        zip -r WebDriverAgentRunner.ipa Payload/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WebDriverAgent-Fixed-IPA
        path: WebDriverAgentRunner.ipa
        if-no-files-found: error
