name: Build Real IPA

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest  # 本物のMac環境でビルドする
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode.app

    - name: Build WebDriverAgent
      run: |
        # 依存関係を解決
        ./Scripts/bootstrap.sh
        
        # 実機（Generic iOS Device）向けにビルドを実行
        # これにより 129KB ではなく数MBのバイナリが生成されます
        xcodebuild -project WebDriverAgent.xcodeproj \
                   -scheme WebDriverAgentRunner \
                   -destination 'generic/platform=iOS' \
                   -configuration Release \
                   -derivedDataPath build \
                   build-for-testing

    - name: Package IPA
      run: |
        # TrollStoreやSideloadlyで認識できるIPA形式にまとめる
        mkdir -p Payload
        cp -r build/Build/Products/Release-iphoneos/WebDriverAgentRunner-Runner.app Payload/
        zip -r WebDriverAgentRunner.ipa Payload/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WebDriverAgent-Fixed-IPA  # ここからダウンロード可能になります
        path: WebDriverAgentRunner.ipa
