name: Build Real IPA

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode.app

    - name: Build WebDriverAgent
      run: |
        # 依存関係の解決を試みる
        if [ -f "./Scripts/bootstrap.sh" ]; then
          ./Scripts/bootstrap.sh || true
        fi
        
        # 署名なしでビルドを強行
        xcodebuild -project WebDriverAgent.xcodeproj \
                   -scheme WebDriverAgentRunner \
                   -destination 'generic/platform=iOS' \
                   -configuration Release \
                   -derivedDataPath build \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGN_IDENTITY="" \
                   CODE_SIGN_ENTITLEMENTS="" \
                   COMPILER_INDEX_STORE_ENABLE=NO \
                   build-for-testing

    - name: Package IPA
      run: |
        # Payloadフォルダの作成と中身のコピー
        mkdir -p Payload
        cp -R build/Build/Products/Release-iphoneos/WebDriverAgentRunner-Runner.app Payload/
        
        # 不要な署名キャッシュを削除
        rm -rf Payload/WebDriverAgentRunner-Runner.app/_CodeSignature
        
        # IPAを作成
        zip -r WebDriverAgentRunner.ipa Payload/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WebDriverAgent-Fixed-IPA
        path: WebDriverAgentRunner.ipa
        if-no-files-found: error
